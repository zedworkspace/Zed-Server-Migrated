version: "3.8"

services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/usr/bin/kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - zed-backend
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      target: development
    init: true
    volumes:
      - type: bind
        source: ./api-gateway
        target: /usr/src/app
      - type: volume
        target: /usr/src/app/node_modules
    container_name: api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
    networks:
      - zed-backend
    restart: unless-stopped
  socket-gateway:
    build:
      context: ./socket-gateway
      target: development
    init: true
    volumes:
      - type: bind
        source: ./socket-gateway
        target: /usr/src/app
      - type: volume
        target: /usr/src/app/node_modules
    container_name: socket-gateway
    ports:
      - "5005:5005"
    env_file:
      - ./socket-gateway/.env
    networks:
      - zed-backend
    restart: unless-stopped
    environment:
      - KAFKA_CLIENT_ID=socket-gateway
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_SEND_MESSAGE=send_message
    depends_on:
      kafka:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      target: development
    init: true
    volumes:
      - type: bind
        source: ./user-service
        target: /usr/src/app
      - type: volume
        target: /usr/src/app/node_modules
    container_name: user-service
    ports:
      - "5001:5001"
    env_file:
      - ./user-service/.env
    networks:
      - zed-backend
    restart: unless-stopped
    environment:
      - KAFKA_CLIENT_ID=user-server
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_SEND_MESSAGE=send_message
      - KAFKA_TOPIC_CREATE_MESSAGE=create_message
    depends_on:
      kafka:
        condition: service_healthy

  project-service:
    build:
      context: ./project-service
      target: development
    init: true
    volumes:
      - type: bind
        source: ./project-service
        target: /usr/src/app
      - type: volume
        target: /usr/src/app/node_modules
    container_name: project-service
    ports:
      - "5002:5002"
    env_file:
      - ./project-service/.env
    networks:
      - zed-backend
    restart: unless-stopped
    environment:
      - KAFKA_CLIENT_ID=project-service
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_PROJECT=project_created
      - KAFKA_TOPIC_CARD_MOVED=card_moved
    depends_on:
      kafka:
        condition: service_healthy

  board-service:
    build:
      context: ./board-service
      target: development
    init: true
    volumes:
      - type: bind
        source: ./board-service
        target: /usr/src/app
      - type: volume
        target: /usr/src/app/node_modules
    container_name: board-service
    ports:
      - "5003:5003"
    env_file:
      - ./board-service/.env
    networks:
      - zed-backend
    restart: unless-stopped
    environment:
      - KAFKA_CLIENT_ID=board-service
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC_PROJECT=project_created
      - KAFKA_TOPIC_CARD_MOVED=card_moved
    depends_on:
      kafka:
        condition: service_healthy
  channel-service:
    build:
      context: ./channel-service
      target: development
    init: true
    volumes:
      - type: bind
        source: ./channel-service
        target: /usr/src/app
      - type: volume
        target: /usr/src/app/node_modules
    container_name: channel-service
    ports:
      - "5004:5004"
    env_file:
      - ./channel-service/.env
    networks:
      - zed-backend
    restart: unless-stopped
    environment:
      - KAFKA_CLIENT_ID=channel-service
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

networks:
  zed-backend:
    driver: bridge

volumes:
  kafka-data: